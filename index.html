<body>

<h1>🚪 Sendoor Dashboard</h1>

<div class="stack layout-readable">

  <div class="box">
    <div class="label">Door Sensor</div>
    <div class="value" id="door">Waiting...</div>
  </div>

  <div class="box">
    <div class="label">Gas Sensor</div>
    <div class="value" id="gas">Waiting...</div>
  </div>

</div>

<script>

// -----------------------------
// PUSH NOTIFICATION SETUP
// -----------------------------

// Replace with your VAPID PUBLIC KEY
const publicKey = "BPsTWW0G_JdU2W6jAFIhH2PEOostqSapMWugVE-uRB4vOgvWi3g1CO-3y2u4srA4B69RtcVXntVtGITQmhZ6Joo";

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, "+")
    .replace(/_/g, "/");

  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

async function registerPush(){

  if(!("serviceWorker" in navigator)){
    console.log("Service workers not supported");
    return;
  }

  const registration = await navigator.serviceWorker.register("/sw.js");
  console.log("Service worker registered");

  let permission = Notification.permission;

  if(permission !== "granted"){
    permission = await Notification.requestPermission();
  }

  if(permission !== "granted"){
    console.log("Notification permission denied");
    return;
  }

  const subscription = await registration.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(publicKey)
  });

  console.log("Push subscribed:", subscription);

  await fetch("/api/app",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(subscription)
  });

  console.log("Subscription sent to backend");

}

async function askNotificationPermission(){

  const savedChoice = localStorage.getItem("notifications_choice");

  // If user already answered before
  if(savedChoice === "granted"){
    registerPush();
    return;
  }

  if(savedChoice === "denied"){
    console.log("User previously denied notifications");
    return;
  }

  // Ask only the first time
  const allow = confirm("¿Quieres recibir notificaciones cuando el sensor detecte actividad?");

  if(!allow){
    localStorage.setItem("notifications_choice","denied");
    return;
  }

  const permission = await Notification.requestPermission();

  if(permission === "granted"){
    localStorage.setItem("notifications_choice","granted");
    registerPush();
  }else{
    localStorage.setItem("notifications_choice","denied");
  }

}

function getSensors(){

  fetch("/api/app")
  .then(res => res.json())
  .then(data => {

    if(data.door){
      const doorEl = document.getElementById("door");
      doorEl.innerText = data.door;
      doorEl.className = "value " + data.door;
    }

    if(data.gas){
      const gasEl = document.getElementById("gas");
      gasEl.innerText = data.gas;
      gasEl.className = "value " + data.gas;
    }

  })
  .catch(err=>{
    console.log("API error",err);
  });

}
askNotificationPermission();
getSensors();
setInterval(getSensors,2000);


</script>
